<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Hopper</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a1a; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
  #ui-top { display: flex; align-items: center; justify-content: space-between; padding: 8px 16px; background: rgba(10,10,26,0.95); border-bottom: 1px solid rgba(255,255,255,0.08); z-index: 10; flex-shrink: 0; }
  #world-info { display: flex; align-items: center; gap: 10px; }
  #world-badge { padding: 3px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; }
  #world-name { font-size: 14px; color: #fff; font-weight: 500; }
  #dimension-counter { font-size: 11px; color: rgba(255,255,255,0.35); }
  #portal-bar { display: flex; align-items: center; gap: 8px; }
  #portal-label { font-size: 11px; color: rgba(255,255,255,0.4); }
  #portal-progress-wrap { width: 100px; height: 5px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
  #portal-progress { height: 100%; border-radius: 3px; transition: width 0.3s; }
  #portal-text { font-size: 11px; color: rgba(255,255,255,0.6); min-width: 90px; text-align: right; }
  #game-wrap { display: flex; flex: 1; overflow: hidden; }
  #canvas-area { flex: 1; position: relative; }
  #gameCanvas { display: block; width: 100%; height: 100%; }
  #side-panel { width: 255px; background: rgba(10,10,26,0.96); border-left: 1px solid rgba(255,255,255,0.07); display: flex; flex-direction: column; overflow: hidden; }
  .panel-tab-bar { display: flex; border-bottom: 1px solid rgba(255,255,255,0.07); flex-shrink: 0; }
  .panel-tab { flex: 1; padding: 9px 4px; font-size: 11px; color: rgba(255,255,255,0.4); background: transparent; border: none; cursor: pointer; font-weight: 500; border-bottom: 2px solid transparent; transition: all 0.15s; }
  .panel-tab:hover { color: rgba(255,255,255,0.7); }
  .panel-tab.active { color: #fff; border-bottom-color: currentColor; }
  .panel-content { flex: 1; overflow-y: auto; padding: 10px; display: none; }
  .panel-content.active { display: block; }
  .panel-content::-webkit-scrollbar { width: 3px; }
  .panel-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }
  .inv-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-bottom: 12px; }
  .inv-slot { aspect-ratio: 1; border-radius: 7px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.04); display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
  .inv-slot .item-icon { font-size: 20px; line-height: 1; }
  .inv-slot .item-count { font-size: 9px; color: rgba(255,255,255,0.5); font-weight: 600; }
  .inv-slot .item-name { font-size: 8px; color: rgba(255,255,255,0.3); text-align: center; padding: 0 2px; }
  .craft-recipe { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 9px; padding: 9px; margin-bottom: 7px; }
  .craft-recipe.craftable { border-color: rgba(100,220,150,0.35); background: rgba(100,220,150,0.05); }
  .recipe-header { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; }
  .recipe-icon { font-size: 18px; }
  .recipe-name { font-size: 12px; color: #fff; font-weight: 500; }
  .recipe-desc { font-size: 10px; color: rgba(255,255,255,0.4); margin-bottom: 5px; line-height: 1.4; }
  .recipe-ingredients { display: flex; flex-wrap: wrap; gap: 4px; }
  .ingredient-tag { font-size: 9px; padding: 2px 6px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.5); }
  .ingredient-tag.have { color: rgba(100,220,150,0.9); border-color: rgba(100,220,150,0.3); }
  .craft-btn { width: 100%; margin-top: 7px; padding: 5px; border-radius: 5px; font-size: 11px; font-weight: 600; border: none; cursor: pointer; transition: all 0.15s; }
  .craft-btn.can { background: rgba(100,220,150,0.2); color: rgb(100,220,150); }
  .craft-btn.can:hover { background: rgba(100,220,150,0.3); }
  .craft-btn.cannot { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.2); cursor: not-allowed; }
  .codex-world { border-radius: 9px; padding: 9px; margin-bottom: 7px; border: 1px solid rgba(255,255,255,0.07); background: rgba(255,255,255,0.03); }
  .codex-world-header { display: flex; align-items: center; gap: 7px; margin-bottom: 3px; }
  .codex-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .codex-world-name { font-size: 12px; font-weight: 500; color: #fff; }
  .codex-world-desc { font-size: 10px; color: rgba(255,255,255,0.4); line-height: 1.4; }
  .codex-resources { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 5px; }
  .codex-res-tag { font-size: 9px; padding: 1px 5px; border-radius: 7px; background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.45); }
  #minimap-wrap { position: absolute; bottom: 12px; right: 12px; }
  #minimapCanvas { border-radius: 6px; border: 1px solid rgba(255,255,255,0.15); display: block; }
  #minimap-label { font-size: 9px; color: rgba(255,255,255,0.25); text-align: center; margin-top: 3px; letter-spacing: 0.04em; }
  #save-indicator { font-size: 10px; color: rgba(255,255,255,0.3); display: flex; align-items: center; gap: 4px; }
  #save-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(100,220,150,0.5); }
  /* Goal banner */
  #goal-banner { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); background: rgba(10,10,30,0.88); border: 1px solid rgba(255,255,255,0.12); border-radius: 12px; padding: 7px 16px; font-size: 12px; color: rgba(255,255,255,0.75); display: none; pointer-events: none; white-space: nowrap; }
  #goal-banner.visible { display: block; }
  /* Portal overlay */
  #portal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0); z-index: 100; display: none; align-items: center; justify-content: center; flex-direction: column; transition: background 0.5s; }
  #portal-overlay.active { display: flex; }
  #particle-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 99; display: none; }
  #particle-canvas.active { display: block; }
  #portal-swirl { width: 180px; height: 180px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 44px; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #portal-msg { color: #fff; font-size: 17px; font-weight: 500; margin-top: 18px; opacity: 0.85; }
  #portal-dest { font-size: 13px; color: rgba(255,255,255,0.5); margin-top: 6px; }
  #toast { position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%) translateY(16px); background: rgba(15,15,35,0.96); color: #fff; padding: 9px 18px; border-radius: 18px; font-size: 12px; font-weight: 500; z-index: 200; border: 1px solid rgba(255,255,255,0.1); opacity: 0; transition: all 0.28s; pointer-events: none; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #controls-hint { position: absolute; bottom: 12px; left: 12px; font-size: 10px; color: rgba(255,255,255,0.2); line-height: 1.9; pointer-events: none; }
  #world-switcher { position: fixed; inset: 0; background: rgba(0,0,0,0.72); z-index: 150; display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
  #world-switcher.active { display: flex; }
  #ws-panel { background: #0c0c24; border: 1px solid rgba(255,255,255,0.12); border-radius: 14px; padding: 22px; width: 460px; max-width: 92vw; max-height: 80vh; overflow-y: auto; }
  #ws-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  #ws-title { font-size: 15px; font-weight: 600; color: #fff; }
  #ws-close { background: transparent; border: none; color: rgba(255,255,255,0.4); font-size: 18px; cursor: pointer; padding: 2px 6px; }
  #ws-close:hover { color: #fff; }
  .ws-world { display: flex; align-items: center; gap: 12px; padding: 11px 13px; border-radius: 9px; border: 1px solid rgba(255,255,255,0.07); background: rgba(255,255,255,0.03); margin-bottom: 7px; cursor: pointer; transition: all 0.15s; }
  .ws-world:hover:not(.locked) { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.18); }
  .ws-world.current { border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.06); }
  .ws-world.locked { opacity: 0.32; cursor: not-allowed; }
  .ws-dot { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
  .ws-info { flex: 1; }
  .ws-world-name { font-size: 13px; font-weight: 500; color: #fff; margin-bottom: 2px; }
  .ws-world-desc { font-size: 10px; color: rgba(255,255,255,0.38); }
  .ws-badge { font-size: 10px; padding: 2px 8px; border-radius: 8px; font-weight: 600; flex-shrink: 0; }
  .ws-badge.current-badge { background: rgba(255,255,255,0.14); color: rgba(255,255,255,0.65); }
  .ws-badge.visit-badge { background: rgba(100,220,150,0.15); color: rgb(100,220,150); }
  .ws-badge.lock-badge { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.22); }
  #worlds-btn { padding: 4px 11px; border-radius: 14px; font-size: 11px; font-weight: 600; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.14); color: rgba(255,255,255,0.65); cursor: pointer; transition: all 0.15s; margin-right: 6px; }
  #worlds-btn:hover { background: rgba(255,255,255,0.13); color: #fff; }
  #music-btn { padding: 4px 10px; border-radius: 14px; font-size: 11px; font-weight: 600; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.5); cursor: pointer; transition: all 0.15s; margin-right: 6px; }
  #music-btn:hover { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.8); }
  .section-label { font-size: 10px; color: rgba(255,255,255,0.3); margin-bottom: 7px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
  /* Character creator modal */
  #char-creator { position: fixed; inset: 0; background: rgba(0,0,0,0.78); z-index: 160; display: none; align-items: center; justify-content: center; backdrop-filter: blur(6px); }
  #char-creator.active { display: flex; }
  #cc-panel { background: #0c0c24; border: 1px solid rgba(255,255,255,0.13); border-radius: 16px; padding: 24px; width: 520px; max-width: 95vw; max-height: 90vh; overflow-y: auto; }
  #cc-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
  #cc-title { font-size: 16px; font-weight: 700; color: #fff; }
  #cc-close { background: transparent; border: none; color: rgba(255,255,255,0.4); font-size: 20px; cursor: pointer; }
  #cc-close:hover { color: #fff; }
  #cc-body { display: grid; grid-template-columns: 140px 1fr; gap: 20px; }
  #cc-preview-wrap { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  #cc-preview { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; width: 120px; height: 140px; position: relative; }
  #cc-preview canvas { display: block; }
  #cc-name-wrap { margin-top: 6px; width: 100%; }
  #cc-name { width: 100%; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; color: #fff; font-size: 12px; padding: 6px 10px; text-align: center; outline: none; }
  #cc-name:focus { border-color: rgba(255,255,255,0.35); }
  #cc-options { flex: 1; }
  .cc-section { margin-bottom: 14px; }
  .cc-section-label { font-size: 10px; color: rgba(255,255,255,0.35); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 7px; }
  .cc-swatches { display: flex; flex-wrap: wrap; gap: 7px; }
  .cc-swatch { width: 26px; height: 26px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform 0.1s, border-color 0.15s; flex-shrink: 0; }
  .cc-swatch:hover { transform: scale(1.15); }
  .cc-swatch.selected { border-color: #fff; transform: scale(1.18); }
  .cc-chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .cc-chip { padding: 4px 10px; border-radius: 20px; font-size: 11px; border: 1px solid rgba(255,255,255,0.12); color: rgba(255,255,255,0.55); cursor: pointer; transition: all 0.15s; background: rgba(255,255,255,0.04); white-space: nowrap; }
  .cc-chip:hover { background: rgba(255,255,255,0.1); color: #fff; }
  .cc-chip.selected { background: rgba(255,255,255,0.15); color: #fff; border-color: rgba(255,255,255,0.45); }
  #cc-save { width: 100%; margin-top: 18px; padding: 10px; border-radius: 10px; background: rgba(100,220,150,0.18); border: 1px solid rgba(100,220,150,0.35); color: rgb(100,220,150); font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.15s; }
  #cc-save:hover { background: rgba(100,220,150,0.28); }
  #char-btn { padding: 4px 11px; border-radius: 14px; font-size: 11px; font-weight: 600; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.14); color: rgba(255,255,255,0.65); cursor: pointer; transition: all 0.15s; margin-right: 6px; }
  #char-btn:hover { background: rgba(255,255,255,0.13); color: #fff; }
  .goal-card { background: rgba(255,200,50,0.07); border: 1px solid rgba(255,200,50,0.2); border-radius: 9px; padding: 9px; margin-bottom: 10px; }
  .goal-title { font-size: 11px; font-weight: 600; color: rgba(255,200,50,0.9); margin-bottom: 4px; }
  .goal-desc { font-size: 10px; color: rgba(255,255,255,0.5); line-height: 1.5; }
  .goal-progress { height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-top: 6px; overflow: hidden; }
  .goal-progress-fill { height: 100%; border-radius: 2px; transition: width 0.4s; }
</style>
</head>
<body>
<div id="ui-top">
  <div id="world-info">
    <div id="world-badge">W1</div>
    <div id="world-name">Loading...</div>
    <div id="dimension-counter">Dimension 1</div>
    <div id="save-indicator"><div id="save-dot"></div><span id="save-text">Saved</span></div>
  </div>
  <div id="portal-bar">
    <button id="music-btn" onclick="toggleMusic()">🔇 Music</button>
    <button id="char-btn" onclick="openCharCreator()">🧝 Character</button>
    <button id="worlds-btn" onclick="openWorldSwitcher()">🌍 Worlds</button>
    <span id="portal-label">Portal:</span>
    <div id="portal-progress-wrap"><div id="portal-progress" style="width:0%"></div></div>
    <span id="portal-text">Craft key</span>
  </div>
</div>
<div id="game-wrap">
  <div id="canvas-area">
    <canvas id="gameCanvas"></canvas>
    <div id="goal-banner">🎯 Goal: Craft a Crystal Lamp to light the caverns!</div>
    <div id="minimap-wrap">
      <canvas id="minimapCanvas" width="100" height="80"></canvas>
      <div id="minimap-label">MAP</div>
    </div>
    <div id="controls-hint">WASD / Arrows · Walk to collect · Space = portal key</div>
  </div>
  <div id="side-panel">
    <div class="panel-tab-bar">
      <button class="panel-tab active" data-tab="inventory">🎒 Bag</button>
      <button class="panel-tab" data-tab="crafting">⚗️ Craft</button>
      <button class="panel-tab" data-tab="codex">📖 Codex</button>
    </div>
    <div id="tab-inventory" class="panel-content active"></div>
    <div id="tab-crafting" class="panel-content"></div>
    <div id="tab-codex" class="panel-content"></div>
  </div>
</div>
<div id="char-creator">
  <div id="cc-panel">
    <div id="cc-header">
      <div id="cc-title">🧝 Customise Your Character</div>
      <button id="cc-close" onclick="closeCharCreator()">✕</button>
    </div>
    <div id="cc-body">
      <div id="cc-preview-wrap">
        <canvas id="cc-canvas" width="120" height="150"></canvas>
        <div id="cc-name-wrap">
          <input id="cc-name" type="text" maxlength="16" placeholder="Your name..." />
        </div>
      </div>
      <div id="cc-options"></div>
    </div>
    <button id="cc-save" onclick="saveCharacter()">✅ Save Character</button>
  </div>
</div>
<div id="world-switcher">
  <div id="ws-panel">
    <div id="ws-header"><div id="ws-title">🌍 Your Dimensions</div><button id="ws-close" onclick="closeWorldSwitcher()">✕</button></div>
    <div id="ws-list"></div>
  </div>
</div>
<canvas id="particle-canvas"></canvas>
<div id="portal-overlay">
  <div id="portal-swirl">🌀</div>
  <div id="portal-msg">Entering new dimension...</div>
  <div id="portal-dest"></div>
</div>
<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════
// WORLD GOALS — per-world objectives that affect gameplay
// ═══════════════════════════════════════════════════════
// permanent:true  → effect ALWAYS returns on each visit (must re-craft every time)
// permanent:false → effect clears FOREVER once solved (first visit only)
const WORLD_GOALS = {
  // DARKNESS worlds — must re-light every visit
  crystal:  { id:'lamp',    desc:'The caverns are pitch dark. Craft a Crystal Lamp to light your way!',          craftId:'k3',  unlocks:'light', craftName:'Crystal Lamp',    permanent:true  },
  autumn:   { id:'lantern', desc:'The forest is dim and shadowy. Craft a Forest Lantern to see the path!',       craftId:'k8',  unlocks:'light', craftName:'Forest Lantern',  permanent:true  },
  mushroom: { id:'spore',   desc:'Spores cloud the air. Craft a Spore Lantern to glow through the dark!',        craftId:'k15', unlocks:'light', craftName:'Spore Lantern',   permanent:true  },
  // FOG worlds — fog clears permanently once you craft the item
  tropics:  { id:'compass', desc:'Sea fog blankets the shore. Craft a Pearl Necklace to find your bearings!',    craftId:'k5',  unlocks:'fog',   craftName:'Pearl Necklace',  permanent:false },
  sky:      { id:'prism',   desc:'Storm clouds block your view. Craft a Rainbow Prism to part them!',            craftId:'k10', unlocks:'fog',   craftName:'Rainbow Prism',   permanent:false },
  volcano:  { id:'shield',  desc:'Toxic ash fills the air. Craft an Obsidian Blade to cut through the haze!',   craftId:'k11', unlocks:'fog',   craftName:'Obsidian Blade',  permanent:false },
  snow:     { id:'globe',   desc:'A blizzard blinds you completely. Craft a Frost Globe to calm the storm!',     craftId:'k13', unlocks:'fog',   craftName:'Frost Globe',     permanent:false },
};

// ═══════════════════════════════════════════════════════
// WORLD DEFINITIONS (8 worlds)
// ═══════════════════════════════════════════════════════
const WORLDS = [
  {
    id:'meadow', name:'Sunlit Meadow', badge:'W1',
    accent:'#7ec850', badgeBg:'#4a9e2f', badgeText:'#fff',
    desc:'A warm golden meadow humming with bees and wildflowers.',
    music:'meadow',
    resources:[
      {id:'flower',icon:'🌸',name:'Flower',color:'#f472b6'},
      {id:'grass',icon:'🌿',name:'Grass',color:'#4ade80'},
      {id:'mushroom',icon:'🍄',name:'Mushroom',color:'#fb923c'},
      {id:'berry',icon:'🫐',name:'Berry',color:'#818cf8'},
      {id:'honey',icon:'🍯',name:'Honey',color:'#fbbf24'},
      {id:'pebble',icon:'🪨',name:'Pebble',color:'#94a3b8'},
    ],
    palette:['#5a9e3a','#4a8e2a','#6ab04a','#3a7a1a','#7ac05a','#2d5a1b'],
    groundColor:'#4a8e2a', particleColors:['#7ec850','#f472b6','#fbbf24','#fff'],
    obstacleColor:'#2d5a1b', obstacleIcon:'🌳', obstacleRate:0.06,
  },
  {
    id:'crystal', name:'Crystal Caverns', badge:'W2',
    accent:'#a78bfa', badgeBg:'#6d28d9', badgeText:'#fff',
    desc:'A glittering underground cavern filled with magical crystals.',
    music:'crystal',
    resources:[
      {id:'crystal_blue',icon:'💎',name:'Blue Crystal',color:'#60a5fa'},
      {id:'crystal_pink',icon:'🔮',name:'Pink Crystal',color:'#f472b6'},
      {id:'glowstone',icon:'✨',name:'Glowstone',color:'#fde68a'},
      {id:'moonrock',icon:'🌑',name:'Moonrock',color:'#94a3b8'},
      {id:'stardust',icon:'⭐',name:'Stardust',color:'#fbbf24'},
      {id:'lichen',icon:'🌾',name:'Cave Lichen',color:'#34d399'},
    ],
    palette:['#2d2d6a','#1a1a5a','#3a3a7a','#252560','#4a4a8a','#1a1a4a'],
    groundColor:'#252565', particleColors:['#a78bfa','#60a5fa','#f472b6','#fde68a'],
    obstacleColor:'#6d28d9', obstacleIcon:'💠', obstacleRate:0.08,
  },
  {
    id:'tropics', name:'Tropical Shore', badge:'W3',
    accent:'#38bdf8', badgeBg:'#0284c7', badgeText:'#fff',
    desc:'Warm sands, turquoise waters, and colourful tropical life.',
    music:'tropics',
    resources:[
      {id:'shell',icon:'🐚',name:'Shell',color:'#fde68a'},
      {id:'coconut',icon:'🥥',name:'Coconut',color:'#d97706'},
      {id:'coral',icon:'🪸',name:'Coral',color:'#f87171'},
      {id:'seaweed',icon:'🌊',name:'Seaweed',color:'#34d399'},
      {id:'pearl',icon:'🫧',name:'Pearl',color:'#e2e8f0'},
      {id:'driftwood',icon:'🪵',name:'Driftwood',color:'#92400e'},
    ],
