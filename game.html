function updateHeader() {
  const world=currentWorld();
  const badge=document.getElementById('world-badge');
  badge.textContent=world.badge; badge.style.background=world.badgeBg; badge.style.color=world.badgeText;
  document.getElementById('world-name').textContent=world.name;
  document.getElementById('dimension-counter').textContent=`Dimension ${state.worldIndex}`;
  const bar=document.getElementById('portal-progress');
  bar.style.width=Math.min(state.portalKeyCount*100,100)+'%'; bar.style.background=world.accent;
  document.getElementById('portal-text').textContent=state.portalKeyCount>0?'Key ready! (Space)':'Craft key';
}

const resLookup={};
WORLDS.forEach(w=>w.resources.forEach(r=>{resLookup[r.id]=r;}));
// Extend resLookup with current world resources (handles procedural worlds)
function refreshResLookup() {
  const w = currentWorld();
  w.resources.forEach(r=>{ resLookup[r.id]=r; });
}

function renderInventory() {
  const world=currentWorld();
  const goal=getCurrentGoal();
  const effect=getWorldEffect(); // single source of truth: null=clear, 'light'/'fog'=active
  const el=document.getElementById('tab-inventory');
  const inv=state.inventory;
  const allItems=Object.entries(inv).filter(([,v])=>v>0);
  let html='<div class="section-label">Collected</div>';

  // ── Goal card ────────────────────────────────────────
  if (goal) {
    if (effect) {
      // Effect is active — show progress or challenge card
      const ingredients = goal.ingredients ||
        RECIPES.find(r=>r.id===goal.craftId)?.ingredients || {};
      let progress=0, total=0;
      Object.entries(ingredients).forEach(([id,amt])=>{ total+=amt; progress+=Math.min(state.inventory[id]||0,amt); });
      const pct=total>0?Math.round(progress/total*100):0;
      const typeIcon  = goal.unlocks==='light' ? '🕯️' : '🌫️';
      const typeTitle = goal.unlocks==='light' ? 'Darkness Challenge' : 'Fog Challenge';
      const typeNote  = goal.permanent ? 'Returns each visit' : 'Clears permanently';
      const cardBg    = goal.permanent ? 'rgba(255,200,50,0.07)' : 'rgba(100,180,255,0.07)';
      const cardBdr   = goal.permanent ? 'rgba(255,200,50,0.2)'  : 'rgba(100,180,255,0.2)';
      const titleClr  = goal.permanent ? 'rgba(255,210,60,0.95)' : 'rgba(130,195,255,0.95)';
      html+=`<div class="goal-card" style="background:${cardBg};border-color:${cardBdr}">
        <div class="goal-title" style="color:${titleClr}">${typeIcon} ${typeTitle} <span style="font-weight:400;font-size:9px;opacity:0.65">· ${typeNote}</span></div>
        <div class="goal-desc">${goal.desc}</div>
        <div class="goal-progress"><div class="goal-progress-fill" style="width:${pct}%;background:${world.accent}"></div></div>
      </div>`;
    } else {
      // Effect is cleared
      const completedMsg = goal.permanent
        ? `${goal.craftName} is active! Darkness returns when you leave.`
        : `${goal.craftName} used — cleared!`;
      const completedIcon = goal.permanent ? '🕯️' : '✅';
      html+=`<div class="goal-card" style="border-color:rgba(100,220,150,0.3);background:rgba(100,220,150,0.05)">
        <div class="goal-title" style="color:rgba(100,220,150,0.9)">${completedIcon} Active!</div>
        <div class="goal-desc">${completedMsg}</div>
      </div>`;
    }
  }

  if (allItems.length===0) {
    html+='<div style="font-size:11px;color:rgba(255,255,255,0.28);text-align:center;padding:12px 0 6px;">Walk over glowing items!</div>';
  } else {
    html+='<div class="inv-grid">';
    allItems.forEach(([id,count])=>{
      const res=resLookup[id]||world.resources.find(r=>r.id===id);
      if(!res) return;
      html+=`<div class="inv-slot"><div class="item-icon">${res.icon}</div><div class="item-count">×${count}</div><div class="item-name">${res.name}</div></div>`;
    });
    html+='</div>';
  }
  // ── ITEMS / KEEPSAKES ────────────────────────────────
  if (state.crafted.length > 0) {
    const currentEffect = getWorldEffect();
    const goal = getCurrentGoal();

    // Hint banner: matching tool available for this world
    const matchingTool = currentEffect
      ? state.crafted.find(c => c.effect === currentEffect && c.forWorldId === world.id)
      : null;
    if (matchingTool && !isGoalComplete(world.id) && state.lightOn[world.id] !== false) {
      const hintIcon = currentEffect === 'light' ? '🕯️' : '🌫️';
      const hintVerb = currentEffect === 'light' ? 'light the way' : 'clear the fog';
      html+=`<div style="background:rgba(255,220,80,0.10);border:1px solid rgba(255,220,80,0.25);border-radius:8px;padding:8px 10px;margin-bottom:8px;font-size:11px;color:rgba(255,220,80,0.9);">${hintIcon} You have a <b>${matchingTool.name}</b> — toggle it on below!</div>`;
    }

    html += '<div class="section-label" style="margin-top:8px;">Keepsakes &amp; Tools</div>';

    state.crafted.forEach((c, idx) => {
      const isEffect   = !!c.effect;
      const rightWorld = c.forWorldId === world.id;
      const wrongWorld = c.forWorldId && c.forWorldId !== world.id;
      const isEquipped = state.equippedIdx === idx;

      // ── EFFECT ITEM (lantern / lens) ─────────────────
      if (isEffect) {
        // Light is ON when getWorldEffect() returns null (effect cleared)
        // Light is OFF when getWorldEffect() returns 'light' or 'fog' (effect active)
        const currentlyOn = rightWorld && !getWorldEffect();

        const cardBorder = wrongWorld
          ? 'rgba(255,80,80,0.25)'
          : currentlyOn ? 'rgba(100,220,150,0.4)' : 'rgba(255,200,80,0.25)';
        const cardBg = wrongWorld
          ? 'rgba(255,80,80,0.06)'
          : currentlyOn ? 'rgba(100,220,150,0.07)' : 'rgba(255,200,80,0.05)';

        // Icon with state overlay
        let iconHtml;
        if (wrongWorld) {
          iconHtml = `<div style="position:relative;width:34px;height:34px;flex-shrink:0">
            <span style="font-size:24px;line-height:34px;display:block;text-align:center;opacity:0.35">${c.icon}</span>
            <svg style="position:absolute;inset:0;width:100%;height:100%" viewBox="0 0 34 34">
              <line x1="4" y1="4" x2="30" y2="30" stroke="#ff4444" stroke-width="3" stroke-linecap="round"/>
              <line x1="30" y1="4" x2="4" y2="30" stroke="#ff4444" stroke-width="3" stroke-linecap="round"/>
            </svg>
          </div>`;
        } else if (currentlyOn) {
          iconHtml = `<div style="width:34px;height:34px;flex-shrink:0;filter:drop-shadow(0 0 8px ${c.effect==='light'?'#fbbf24':'#7dd3fc'})">
            <span style="font-size:24px;line-height:34px;display:block;text-align:center">${c.icon}</span>
          </div>`;
        } else {
          iconHtml = `<div style="width:34px;height:34px;flex-shrink:0">
            <span style="font-size:24px;line-height:34px;display:block;text-align:center;opacity:0.6">${c.icon}</span>
          </div>`;
        }

        // Status label
        const statusText = wrongWorld
          ? `<span style="font-size:9px;color:rgba(255,100,100,0.85)">✕ Only works in ${c.forWorldName||'another world'}</span>`
          : currentlyOn
            ? `<span style="font-size:9px;color:rgba(100,220,150,0.9)">● ON — ${c.effect==='light'?'Illuminated':'Fog cleared'}</span>`
            : `<span style="font-size:9px;color:rgba(255,200,80,0.75)">○ OFF — ${c.effect==='light'?'Darkness active':'Fog active'}</span>`;

        const worldTag = c.forWorldName
          ? `<span style="font-size:9px;color:rgba(255,255,255,0.28)">${c.forWorldName}</span>`
          : '';

        // Toggle button — ONLY for right world items
        let btnHtml = '';
        if (rightWorld) {
          btnHtml = currentlyOn
            ? `<button onclick="toggleLight(${idx})" style="padding:4px 10px;border-radius:6px;font-size:10px;font-weight:700;background:rgba(100,220,150,0.15);border:1px solid rgba(100,220,150,0.4);color:rgb(100,220,150);cursor:pointer;white-space:nowrap;">Turn Off</button>`
            : `<button onclick="toggleLight(${idx})" style="padding:4px 10px;border-radius:6px;font-size:10px;font-weight:700;background:rgba(255,200,80,0.15);border:1px solid rgba(255,200,80,0.4);color:rgb(255,200,80);cursor:pointer;white-space:nowrap;">Turn On</button>`;
        }
        // wrongWorld items: no button at all, just the red slash and label

        html += `<div style="display:flex;align-items:center;gap:9px;background:${cardBg};border:1px solid ${cardBorder};border-radius:10px;padding:9px 10px;margin-bottom:6px;">
          ${iconHtml}
          <div style="flex:1;min-width:0">
            <div style="font-size:11px;font-weight:500;color:rgba(255,255,255,${wrongWorld?'0.4':'0.85'})">${c.name}</div>
            <div style="display:flex;gap:6px;margin-top:2px;flex-wrap:wrap">${statusText} ${worldTag}</div>
          </div>
          ${btnHtml}
        </div>`;

      // ── KEEPSAKE ITEM (equippable) ───────────────────
      } else {
        const cardBorder = isEquipped ? 'rgba(167,139,250,0.5)' : 'rgba(255,255,255,0.1)';
        const cardBg     = isEquipped ? 'rgba(167,139,250,0.1)' : 'rgba(255,255,255,0.04)';
        const equippedTag = isEquipped
          ? `<span style="font-size:9px;color:rgba(167,139,250,0.9)">● Equipped</span>`
          : `<span style="font-size:9px;color:rgba(255,255,255,0.28)">Not equipped</span>`;
        const equipBtn = isEquipped
          ? `<button onclick="equipItem(${idx})" style="padding:4px 10px;border-radius:6px;font-size:10px;font-weight:700;background:rgba(167,139,250,0.15);border:1px solid rgba(167,139,250,0.4);color:rgb(167,139,250);cursor:pointer;white-space:nowrap;">Unequip</button>`
          : `<button onclick="equipItem(${idx})" style="padding:4px 10px;border-radius:6px;font-size:10px;font-weight:700;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.18);color:rgba(255,255,255,0.7);cursor:pointer;white-space:nowrap;">Equip</button>`;

        html += `<div style="display:flex;align-items:center;gap:9px;background:${cardBg};border:1px solid ${cardBorder};border-radius:10px;padding:9px 10px;margin-bottom:6px;${isEquipped?'box-shadow:0 0 12px rgba(167,139,250,0.15)':''}">
          <span style="font-size:24px;line-height:1;${isEquipped?'filter:drop-shadow(0 0 6px rgba(167,139,250,0.8))':''}">${c.icon}</span>
          <div style="flex:1;min-width:0">
            <div style="font-size:11px;font-weight:500;color:rgba(255,255,255,0.85)">${c.name}</div>
            <div style="margin-top:2px">${equippedTag}</div>
          </div>
          ${equipBtn}
        </div>`;
      }
    });
  }
  if (state.portalKeyCount>0) {
    html+=`<div style="background:rgba(255,215,0,0.08);border:1px solid rgba(255,215,0,0.18);border-radius:8px;padding:8px 10px;margin-top:8px;font-size:11px;color:rgba(255,215,0,0.8);">🗝️ Portal Key ×${state.portalKeyCount} — press Space!</div>`;
  }
  el.innerHTML=html;
}

function renderCrafting() {
  const world=currentWorld();
  const el=document.getElementById('tab-crafting');
  const worldRecipes=getWorldRecipes(state.worldIndex);
  let html=`<div class="section-label">Recipes in ${world.name}</div>`;
  // Build a local res lookup that includes this world's resources
  const localResLookup = {...resLookup};
  world.resources.forEach(r=>{localResLookup[r.id]=r;});
  worldRecipes.forEach(recipe=>{
    const canCraft=Object.entries(recipe.ingredients).every(([id,amt])=>(state.inventory[id]||0)>=amt);
    const isPortal=recipe.category==='portal';
    html+=`<div class="craft-recipe${canCraft?' craftable':''}">`;
    html+=`<div class="recipe-header"><span class="recipe-icon">${recipe.icon}</span><span class="recipe-name">${recipe.name}</span></div>`;
    html+=`<div class="recipe-desc">${recipe.desc}</div>`;
    html+=`<div class="recipe-ingredients">`;
    Object.entries(recipe.ingredients).forEach(([id,amt])=>{
      const have=(state.inventory[id]||0)>=amt; const res=localResLookup[id];
      html+=`<span class="ingredient-tag${have?' have':''}">${res?res.icon:''} ${res?res.name:id} ×${amt}</span>`;
    });
    html+=`</div>`;
    if (canCraft) html+=`<button class="craft-btn can" onclick="craftRecipe('${recipe.id}')">${isPortal?'🌀 Craft Portal Key':'✨ Craft'}</button>`;
    else html+=`<button class="craft-btn cannot" disabled>Need more resources</button>`;
    html+='</div>';
  });
  el.innerHTML=html;
}

function renderCodex() {
  const el=document.getElementById('tab-codex');
  const visited = [...state.worldsVisited].sort((a,b)=>a-b);
  let html='<div class="section-label">Dimensions discovered</div>';
  visited.forEach(dim=>{
    const w=getWorld(dim);
    html+=`<div class="codex-world">`;
    html+=`<div class="codex-world-header"><div class="codex-dot" style="background:${w.accent}"></div><div class="codex-world-name">${w.name} <span style="opacity:0.4;font-size:10px">#${dim}</span></div></div>`;
    html+=`<div class="codex-world-desc">${w.desc}</div>`;
    html+=`<div class="codex-resources">${w.resources.map(r=>`<span class="codex-res-tag">${r.icon} ${r.name}</span>`).join('')}</div>`;
    html+='</div>';
  });
  if (visited.length < state.worldIndex) {
    html+='<div class="codex-world" style="opacity:0.35"><div class="codex-world-header"><div class="codex-dot" style="background:#555"></div><div class="codex-world-name">??? Unknown Dimension</div></div><div class="codex-world-desc">Craft a portal key to explore beyond.</div></div>';
  }
  el.innerHTML=html;
}

// ═══════════════════════════════════════════════════════
// CRAFTING
// ═══════════════════════════════════════════════════════
function craftRecipe(recipeId) {
  // Find recipe in base RECIPES or in current world's procedural recipes
  let recipe = RECIPES.find(r=>r.id===recipeId);
  if (!recipe) {
    const worldRecipes = getWorldRecipes(state.worldIndex);
    recipe = worldRecipes.find(r=>r.id===recipeId);
  }
  if (!recipe) return;
  const canCraft=Object.entries(recipe.ingredients).every(([id,amt])=>(state.inventory[id]||0)>=amt);
  if (!canCraft) return;
  lastCraftTime = Date.now(); // block Space portal briefly after crafting
  Object.entries(recipe.ingredients).forEach(([id,amt])=>{state.inventory[id]-=amt;});
  if (recipe.category==='portal') {
    state.portalKeyCount++;
    showToast('🗝️ Portal Key crafted! Press Space to jump!');
  } else {
    // Store crafted item with its effect type so it can be used from the bag
    const goalForRecipe = getCurrentGoal();
    const isGoalItem = goalForRecipe && goalForRecipe.craftId === recipeId;
    state.crafted.push({
      id:          recipe.result?.id   || recipeId,
      name:        recipe.result?.name || recipe.name,
      icon:        recipe.result?.icon || recipe.icon,
      effect:      isGoalItem ? goalForRecipe.unlocks : null,
      forWorldId:  currentWorld().id,        // ALL items locked to the world they were crafted in
      forWorldName:currentWorld().name,
    });
    showToast(`${recipe.result?.icon||recipe.icon} ${recipe.result?.name||recipe.name} crafted!`);
    // Check if this completes a goal (base or procedural world)
    const world=currentWorld();
    const goal=getCurrentGoal();
    if (goal&&goal.craftId===recipeId&&!isGoalComplete(world.id)) {
      state.goalsComplete[world.id]=true;
      const msg = goal.unlocks==='light'
        ? '🕯️ Light restored! Take it with you — use it from your bag next time.'
        : (goal.permanent ? '🌫️ Fog cleared! Use it from your bag on future visits.' : '✅ Fog cleared for good!');
      setTimeout(()=>showToast(msg),600);
      updateGoalBanner();
    }
  }
  renderInventory(); renderCrafting(); updateHeader(); scheduleSave();
}

// ═══════════════════════════════════════════════════════
// ITEM INTERACTIONS
// ═══════════════════════════════════════════════════════

// Toggle the light/fog effect on or off for this visit
function toggleLight(idx) {
  const item = state.crafted[idx];
  if (!item || !item.effect) return;
  const world = currentWorld();
  const goal = getCurrentGoal();
  if (!goal) return;
  if (item.forWorldId !== world.id) return;
  if (item.effect !== goal.unlocks) return;

  const wid = world.id;
  // effect is null = light is ON (cleared). effect = 'light'/'fog' = light is OFF (active)
  const effectActive = !!getWorldEffect();

  if (!effectActive) {
    // Currently ON — turn OFF (restore darkness/fog)
    state.lightOn[wid] = false;
    delete state.goalsComplete[wid];
    const icon = item.effect === 'light' ? '🌑' : '🌫️';
    showToast(`${icon} ${item.name} turned off.`);
  } else {
    // Currently OFF — turn ON (clear effect)
    state.lightOn[wid] = true;
    state.goalsComplete[wid] = true;
    const icon = item.effect === 'light' ? '🕯️' : '✨';
    showToast(`${icon} ${item.name} turned on!`);
  }
  updateGoalBanner();
  renderInventory();
  scheduleSave();
}

// Legacy alias used by old code paths (crafting in-world)
function useItemFromBag(idx) { toggleLight(idx); }

// Equip / unequip a keepsake to display it on the character
function equipItem(idx) {
  if (state.equippedIdx === idx) {
    state.equippedIdx = null;
    showToast('Item unequipped.');
  } else {
    state.equippedIdx = idx;
    const item = state.crafted[idx];
    showToast(`${item.icon} ${item.name} equipped!`);
  }
  renderInventory();
  scheduleSave();
}

// ═══════════════════════════════════════════════════════
// PORTAL + TRAVEL
// ═══════════════════════════════════════════════════════
function doTransition(nextDim, label) {
  state.transitioning=true;
  const overlay=document.getElementById('portal-overlay');
  const swirl=document.getElementById('portal-swirl');
  const nextWorld=getWorld(nextDim);
  swirl.style.background=`radial-gradient(circle, ${nextWorld.accent}44, ${nextWorld.badgeBg}88)`;
  document.getElementById('portal-msg').textContent=label;
  document.getElementById('portal-dest').textContent=nextWorld.name;
  overlay.classList.add('active');
  overlay.style.background='rgba(0,0,0,0)';
  triggerParticles(nextWorld.particleColors);
  setTimeout(()=>{ overlay.style.background='rgba(0,0,0,0.82)'; },50);
  setTimeout(()=>{
    const isFirstVisit = !state.worldsVisited.includes(nextDim);
    state.worldIndex=nextDim;
    state.dimensionCount++;
    if (isFirstVisit) state.worldsVisited.push(nextDim);
    // Determine goal reset behaviour
    const nextGoal = nextWorld.proceduralGoal || WORLD_GOALS[nextWorld.id] || null;
    if (nextGoal) {
      if (nextGoal.permanent) {
        delete state.goalsComplete[nextWorld.id];
        delete state.lightOn[nextWorld.id]; // reset toggle each visit
      } else if (isFirstVisit) {
        delete state.goalsComplete[nextWorld.id];
        delete state.lightOn[nextWorld.id];
      }
    }
    generateWorld(nextWorld);
    updateHeader(); renderInventory(); renderCrafting(); renderCodex(); scheduleSave();
    if (musicOn) playWorldMusic(nextWorld.music);
    overlay.style.background='rgba(0,0,0,0)';
    setTimeout(()=>{overlay.classList.remove('active'); state.transitioning=false;},500);
  },1500);
}

function usePortalKey(targetDim) {
  state.portalKeyCount--;
  const nextDim = targetDim !== null ? targetDim : state.worldIndex + 1;
  doTransition(nextDim, 'Entering new dimension...');
}

// ═══════════════════════════════════════════════════════
// WORLD SWITCHER
// ═══════════════════════════════════════════════════════
function openWorldSwitcher() { renderWorldSwitcher(); document.getElementById('world-switcher').classList.add('active'); }
function closeWorldSwitcher() { document.getElementById('world-switcher').classList.remove('active'); }
document.getElementById('world-switcher').addEventListener('click',e=>{ if(e.target===document.getElementById('world-switcher')) closeWorldSwitcher(); });

function renderWorldSwitcher() {
  const list=document.getElementById('ws-list');
  const visited=[...state.worldsVisited].sort((a,b)=>a-b);
  let html='';
  visited.forEach(dim=>{
    const w=getWorld(dim);
    const isCurrent=dim===state.worldIndex;
    let cls='ws-world'+(isCurrent?' current':'');
    const onclick=!isCurrent?`travelToWorld(${dim})`:'';
    html+=`<div class="${cls}" ${onclick?`onclick="${onclick}"`:''}>`;
    html+=`<div class="ws-dot" style="background:${w.badgeBg}22;border:1.5px solid ${w.badgeBg}77">${w.resources[0].icon}</div>`;
    html+=`<div class="ws-info"><div class="ws-world-name">${w.name} <span style="opacity:0.4;font-size:10px">#${dim}</span></div><div class="ws-world-desc">${w.desc}</div></div>`;
    if (isCurrent) html+=`<span class="ws-badge current-badge">Here</span>`;
    else html+=`<span class="ws-badge visit-badge">Travel →</span>`;
    html+='</div>';
  });
  // Tease next undiscovered dimension
  const maxVisited=Math.max(...visited);
  const nextDim=maxVisited+1;
  html+=`<div class="ws-world locked"><div class="ws-dot" style="background:#33335522;border:1.5px solid #55555577">🌀</div><div class="ws-info"><div class="ws-world-name">??? Dimension ${nextDim}</div><div class="ws-world-desc">Craft a portal key to discover what lies beyond.</div></div><span class="ws-badge lock-badge">🔒 Locked</span></div>`;
  list.innerHTML=html;
}

function travelToWorld(dim) {
  if (state.transitioning||dim===state.worldIndex) return;
  closeWorldSwitcher();
  doTransition(dim,'Returning to...');
}

// ═══════════════════════════════════════════════════════
// TABS + TOAST
// ═══════════════════════════════════════════════════════
document.querySelectorAll('.panel-tab').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.panel-tab').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.panel-content').forEach(c=>c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-'+btn.dataset.tab).classList.add('active');
  });
});

let toastTimer;
function showToast(msg) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),2600);
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
resizeCanvas();
loadGame();
loadCharacter();
generateWorld(currentWorld());
centerCamera();
updateHeader(); renderInventory(); renderCrafting(); renderCodex();
requestAnimationFrame(update);
</script>
